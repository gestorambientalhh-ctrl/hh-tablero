<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tasks Socios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f0f4f8;color:#1a1a1a;min-height:100vh;overflow-x:hidden}
:root{--blue:#2563eb;--blue-dark:#1d4ed8;--blue-light:#eff6ff;--blue-mid:#dbeafe;--border:#e2e8f0;--bg:#fff;--bg2:#f0f4f8;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--red:#ef4444}

/* LOCK */
.lock-screen{
  position:fixed !important;
  top:0 !important;
  left:0 !important;
  right:0 !important;
  bottom:0 !important;
  width:100vw !important;
  height:100vh !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  padding:20px;
  background:#06111f;
  z-index:9999;
  overflow:hidden;
  box-sizing:border-box;
}
.lock-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(37,99,235,.18) 0%,transparent 70%),
             radial-gradient(ellipse 60% 40% at 80% 80%,rgba(14,165,233,.1) 0%,transparent 60%),
             #06111f;
}
.lock-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:48px 48px;
}
.lock-card{
  position:relative;z-index:1;
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:44px 40px 40px;
  width:100%;max-width:380px;
  text-align:center;
  box-shadow:0 24px 64px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);
}
.lock-logo{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);
  margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(37,99,235,.4);
}
.lock-logo svg{width:24px;height:24px;fill:#fff}
.lock-brand{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;letter-spacing:-.3px}
.lock-tagline{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:32px;letter-spacing:.08em;text-transform:uppercase}
.lock-label{font-size:11px;color:rgba(255,255,255,.5);text-align:left;margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
.lock-input{
  width:100%;height:48px;font-size:15px;
  text-align:left;letter-spacing:.06em;
  border:1px solid rgba(255,255,255,.12);
  border-radius:10px;margin-bottom:12px;outline:none;
  font-family:inherit;
  background:rgba(255,255,255,.06);
  color:#fff;padding:0 16px;
  transition:border-color .2s,background .2s;
}
.lock-input::placeholder{color:rgba(255,255,255,.2)}
.lock-input:focus{border-color:rgba(37,99,235,.7);background:rgba(255,255,255,.08)}
.lock-btn{
  width:100%;height:48px;
  background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
  letter-spacing:.04em;
  box-shadow:0 4px 20px rgba(37,99,235,.4);
  transition:transform .15s,box-shadow .15s;
}
.lock-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(37,99,235,.55)}
.lock-btn:active{transform:translateY(0)}
.lock-err{font-size:12px;color:#ff7070;margin-bottom:10px;display:none;text-align:left}
.lock-divider{height:1px;background:rgba(255,255,255,.08);margin:24px 0 16px}
.lock-badges{display:flex;justify-content:center;gap:8px}
.lock-badge{
  padding:4px 12px;border-radius:999px;font-size:11px;font-weight:500;
  border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.35);
  display:flex;align-items:center;gap:5px;
}
.lock-badge-dot{width:6px;height:6px;border-radius:50%}

/* TOPNAV */
.topnav{height:52px;background:#fff;border-bottom:2px solid var(--blue-mid);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:100}
.logo-dot{width:28px;height:28px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;cursor:pointer}
.logo-dot svg{width:15px;height:15px;fill:#fff}
.logo-name{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap}

/* PROJECT TABS in topnav */
.proj-tabs{display:flex;gap:4px;margin-left:8px}
.proj-tab{padding:8px 18px;font-size:14px;font-weight:600;border-radius:9px;border:2px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:8px;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.proj-tab:hover{background:#f5f5f3;border-color:#ccc}
.proj-tab.act{color:#fff;border-color:transparent;font-weight:500}
.proj-tab-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}

.topnav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.search-top{height:32px;padding:0 10px;font-size:13px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);outline:none;width:150px}
.fsel-top{height:32px;padding:0 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text2)}
.avatar-btn{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;cursor:pointer;border:none;flex-shrink:0}

/* LAYOUT */
.app-layout{display:flex;height:calc(100vh - 52px);overflow:hidden}

/* MAIN CONTENT */
.main-content{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* PROJECT BAR */
.project-bar{height:48px;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;padding:0 16px;gap:10px;background:var(--bg);flex-shrink:0}
.proj-title{font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-task{background:var(--blue);color:#fff;border:none;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.btn-task:hover{background:var(--blue-dark)}

/* SECTION TABS (Tablero / Dashboard) */
.section-bar{height:40px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:4px;background:#fff;flex-shrink:0}
.sec-tab{padding:5px 14px;font-size:13px;color:var(--text2);cursor:pointer;background:none;border:none;font-family:inherit;border-radius:6px}
.resp-btn{padding:4px 12px;font-size:12px;font-weight:500;border:1.5px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .12s}
.resp-btn:hover{background:var(--blue-light)}
.resp-btn.act{background:var(--blue);color:#fff;border-color:var(--blue)}
.sec-tab:hover{background:var(--blue-light)}
.sec-tab.act{color:var(--blue);font-weight:600;background:var(--blue-light);border-bottom:2px solid var(--blue)}
.sem-leg{margin-left:auto;display:flex;align-items:center;gap:10px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);white-space:nowrap}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* FORM */
.form-area{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);display:none;flex-shrink:0}
.form-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px}
.form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.form-field{display:flex;flex-direction:column;gap:3px}
.form-field label{font-size:11px;color:var(--text2)}
.form-field input,.form-field select{height:34px;font-size:13px;border:1px solid var(--border);border-radius:6px;padding:0 8px;background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.btn-save{height:34px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:0 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-cancel{height:34px;background:none;border:1px solid var(--border);border-radius:8px;padding:0 12px;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit}

/* KANBAN BOARD */
.board{display:flex;gap:14px;padding:16px;overflow-x:auto;overflow-y:auto;flex:1;align-items:flex-start;background:#eef2f7;-webkit-overflow-scrolling:touch}
.col-wrap{width:260px;flex-shrink:0}
.col-header{display:flex;align-items:center;gap:7px;padding:0 2px 10px}
.col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.col-label{font-size:13px;font-weight:600;color:var(--text)}
.col-cnt{font-size:12px;color:var(--text3)}
.col-body{display:flex;flex-direction:column;gap:7px}

/* CARD */
.card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 12px;transition:border-color .12s}
.card:hover{border-color:#ccc}
.card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.card-cb{width:15px;height:15px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;cursor:pointer;transition:all .15s;margin-top:1px}
.card-cb.done{background:var(--blue);border-color:var(--blue)}
.card-title{font-size:13px;color:var(--text);line-height:1.4;flex:1}
.card-title.done{text-decoration:line-through;color:var(--text3)}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.sem-pill{display:flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:500}
.date-pill{font-size:11px;padding:2px 7px;border-radius:999px;background:#f0f0ee;color:var(--text2)}
.date-pill.over{background:#fcebeb;color:#791f1f}
.biz-pill{font-size:11px;padding:2px 7px;border-radius:999px;font-weight:500}
.avatar-sm{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-left:auto;flex-shrink:0;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.card-actions{display:flex;gap:4px;padding-top:7px;border-top:1px solid var(--border);align-items:center}
.ca-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:11px;cursor:pointer;color:var(--text2);font-family:inherit}
.ca-btn:hover{background:#f0f0ee}
.ca-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:17px;margin-left:auto;line-height:1;padding:0 2px}
.ca-del:hover{color:#E24B4A}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 4px;font-size:13px;color:var(--text3);cursor:pointer;border-radius:6px;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.add-btn:hover{color:var(--blue)}
.empty-col{background:var(--bg);border:1px dashed var(--border);border-radius:8px;padding:24px;text-align:center;font-size:12px;color:var(--text3)}

/* GLOBAL VIEW */
.global-view-wrap{flex:1;overflow-y:auto;background:#eef2f7;padding:16px;-webkit-overflow-scrolling:touch}
.gsec{margin-bottom:18px}
.gsec-title{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.gstatus-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin:6px 0 4px}

/* DASHBOARD */
.dash-wrap{flex:1;overflow-y:auto;background:#eef2f7;padding:16px;-webkit-overflow-scrolling:touch}
.dash-h{font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px}
.dash-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
.global-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.global-box-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px}
.global-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.g-stat{background:var(--bg2);border-radius:8px;padding:10px 6px;text-align:center}
.g-n{font-size:22px;font-weight:700}
.g-l{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.03em}
.biz-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.biz-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.biz-card-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.biz-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.biz-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.urg-badge{font-size:11px;background:#FCEBEB;color:#791F1F;padding:2px 8px;border-radius:999px;font-weight:500}
.vencida-badge{display:inline-block;background:#E24B4A;color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;padding:3px 10px;border-radius:5px;margin-bottom:6px;text-transform:uppercase}
.biz-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.biz-stat{background:var(--bg2);border-radius:7px;padding:8px 4px;text-align:center}
.biz-stat-n{font-size:20px;font-weight:700}
.biz-stat-l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.03em}
.prog-bar{height:6px;background:#f0f0ee;border-radius:999px;overflow:hidden;margin-bottom:5px}
.prog-fill{height:100%;border-radius:999px}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text2)}
.people-row{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.person{flex:1;background:var(--bg2);border-radius:7px;padding:8px;text-align:center}
.person-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px}
.person-n{font-size:18px;font-weight:700;color:var(--blue)}
.person-l{font-size:10px;color:var(--text2)}

/* NOTES MODAL */
.notes-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.notes-modal{background:var(--bg);border-radius:12px;width:100%;max-width:420px;padding:0;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.notes-modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notes-modal-title{font-size:14px;font-weight:600;color:var(--text)}
.notes-modal-sub{font-size:12px;color:var(--text2);margin-top:2px}
.notes-close{background:none;border:none;font-size:22px;color:var(--text2);cursor:pointer;line-height:1;padding:0}
.notes-body{padding:16px 20px}
.notes-textarea{width:100%;height:100px;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:inherit;resize:none;outline:none;color:var(--text);background:var(--bg2)}
.notes-textarea:focus{border-color:#ccc}
.notes-history{margin-top:12px;max-height:140px;overflow-y:auto}
.notes-entry{padding:8px 10px;background:var(--bg2);border-radius:7px;margin-bottom:6px;font-size:12px;color:var(--text2);border-left:3px solid var(--border)}
.notes-entry-txt{color:var(--text);margin-bottom:2px;line-height:1.4}
.notes-entry-meta{font-size:10px;color:var(--text3)}
.notes-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px}
/* HISTORY & WORKLOAD */
.dash-section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.dash-section-title svg{width:16px;height:16px;color:var(--blue)}
.history-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:20px}
.history-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.history-card-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.history-weeks{display:flex;gap:6px;align-items:flex-end;height:50px;margin-bottom:6px}
.history-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.history-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .3s}
.history-bar-label{font-size:9px;color:var(--text3);text-align:center}
.history-bar-n{font-size:10px;font-weight:600;color:var(--text2);text-align:center}
.workload-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.wl-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.wl-name{font-size:13px;font-weight:600;color:var(--text);width:80px;flex-shrink:0}
.wl-bar-wrap{flex:1;height:28px;background:var(--bg2);border-radius:6px;overflow:hidden;position:relative;display:flex;align-items:center}
.wl-bar{height:100%;border-radius:6px;transition:width .4s;position:absolute;left:0;top:0}
.wl-count{position:relative;z-index:1;font-size:12px;font-weight:600;padding-left:10px;color:#fff}
.wl-detail{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.wl-chip{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:500}
.wl-empty{text-align:center;padding:20px;color:var(--text3);font-size:12px}
/* MOBILE BOTTOM NAV */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--bg);border-top:1px solid var(--border);z-index:100;justify-content:space-around;align-items:center}
.mob-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--text2);border:none;background:none;cursor:pointer;padding:6px 0;font-family:inherit;flex:1}
.mob-nav-btn.act{color:var(--blue);font-weight:500}
.mob-nav-btn svg{width:20px;height:20px}

/* RESPONSIVE */
@media(max-width:700px){
  .app-layout{height:calc(100vh - 52px - 56px)}
  .mob-nav{display:flex}
  .search-top{width:110px}
  .fsel-top{display:none}
  .col-wrap{width:235px}
  .global-stats{grid-template-columns:repeat(2,1fr)}
  .proj-tabs{display:none}
  .proj-title-bar-tabs{display:flex!important}
}
@media(min-width:701px){
  .mob-nav{display:none!important}
  .proj-title-bar-tabs{display:none!important}
}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock-screen" style="position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;display:flex!important;align-items:center!important;justify-content:center!important;background:#06111f;z-index:9999">
  <div class="lock-bg"></div>
  <div class="lock-grid"></div>
  <div class="lock-card">
    <div class="lock-logo">
      <svg viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="5" r="3.5"/><circle cx="19.5" cy="16.5" r="3.5"/><circle cx="4.5" cy="16.5" r="3.5"/></svg>
    </div>
    <div class="lock-brand">Tasks Socios</div>
    <div class="lock-tagline">Plataforma de gestión operativa</div>
    <div class="lock-label">Clave de acceso</div>
    <input class="lock-input" id="pw-input" type="password" placeholder="Ingresa tu clave" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="lock-err" id="pw-err">⚠ Clave incorrecta. Intenta de nuevo.</div>
    <button class="lock-btn" onclick="checkPw()">Acceder al sistema</button>
    <div class="lock-divider"></div>
    <div class="lock-badges">
      <span class="lock-badge"><span class="lock-badge-dot" style="background:#639922"></span>Gestor HH</span>
      <span class="lock-badge"><span class="lock-badge-dot" style="background:#378ADD"></span>Logístico</span>
      <span class="lock-badge"><span class="lock-badge-dot" style="background:#D85A30"></span>Montevra</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- TOPNAV -->
  <nav class="topnav">
    <div class="logo-dot">
      <svg viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="5" r="3.5"/><circle cx="19.5" cy="16.5" r="3.5"/><circle cx="4.5" cy="16.5" r="3.5"/></svg>
    </div>
    <span class="logo-name">Tasks Socios</span>
    <span id="sync-indicator" style="font-size:10px;color:#16a34a;background:#dcfce7;padding:2px 8px;border-radius:999px;transition:opacity .5s;opacity:0;margin-left:4px">⟳ Sincronizado</span>

    <!-- PROJECT TABS — desktop -->
    <div class="proj-tabs">
      <button class="proj-tab act" id="pt0" onclick="setBiz(0)">
        <span class="proj-tab-dot" style="background:#639922"></span>Gestor HH
      </button>
      <button class="proj-tab" id="pt1" onclick="setBiz(1)">
        <span class="proj-tab-dot" style="background:#378ADD"></span>Logístico
      </button>
      <button class="proj-tab" id="pt2" onclick="setBiz(2)">
        <span class="proj-tab-dot" style="background:#D85A30"></span>Montevra
      </button>
      <button class="proj-tab" id="pt3" onclick="setBiz(3)">
        <span class="proj-tab-dot" style="background:#7F77DD"></span>General
      </button>
    </div>

    <div class="topnav-right">
      <input class="search-top" type="text" placeholder="Buscar..." id="sq" oninput="renderCurrent()">
      <select class="fsel-top" id="fwho" onchange="renderCurrent()">
        <option value="">Todos</option>
        <option>Anderson</option>
        <option>Raul</option>
        <option>Ambos</option>
      </select>
      <button class="avatar-btn" onclick="logout()" title="Salir">HH</button>
    </div>
  </nav>

  <!-- MAIN LAYOUT -->
  <div class="app-layout">
    <div id="section-tablero" class="main-content">

      <!-- PROJECT BAR -->
      <div class="project-bar">
        <span class="proj-title" id="proj-title">Gestor Ambiental HH</span>
        <!-- Project tabs mobile -->
        <div class="proj-title-bar-tabs" style="display:none;gap:4px;flex:1;overflow-x:auto;margin:0 8px">
          <button class="proj-tab act" id="mpt0" onclick="setBiz(0)" style="font-size:12px;padding:4px 10px">
            <span class="proj-tab-dot" style="background:#639922"></span>Gestor
          </button>
          <button class="proj-tab" id="mpt1" onclick="setBiz(1)" style="font-size:12px;padding:4px 10px">
            <span class="proj-tab-dot" style="background:#378ADD"></span>Log.
          </button>
          <button class="proj-tab" id="mpt2" onclick="setBiz(2)" style="font-size:12px;padding:4px 10px">
            <span class="proj-tab-dot" style="background:#D85A30"></span>Mont.
          </button>
          <button class="proj-tab" id="mpt3" onclick="setBiz(3)" style="font-size:12px;padding:4px 10px">
            <span class="proj-tab-dot" style="background:#7F77DD"></span>General
          </button>
        </div>
        <button class="btn-task" id="btn-add" onclick="toggleForm()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nueva tarea
        </button>
      </div>

      <!-- SECTION BAR (Tablero / Dashboard) con semáforo -->
      <div class="section-bar">
        <button class="sec-tab act" id="sec-tablero" onclick="showSection('tablero')">Tablero</button>
        <button class="sec-tab" id="sec-dashboard" onclick="showSection('dashboard')">Dashboard</button>
        <div style="display:flex;align-items:center;gap:6px;margin-left:12px">
          <span style="font-size:11px;color:var(--text2);white-space:nowrap">Ver:</span>
          <button class="resp-btn act" id="rb-all" onclick="setResp('')">Todos</button>
          <button class="resp-btn" id="rb-anderson" onclick="setResp('Anderson')">Anderson</button>
          <button class="resp-btn" id="rb-raul" onclick="setResp('Raul')">Raul</button>
          <button class="resp-btn" id="rb-ambos" onclick="setResp('Ambos')">Ambos</button>
        </div>
        <div class="sem-leg">
          <span class="leg"><span class="leg-dot" style="background:#E24B4A"></span>Vencida</span>
          <span class="leg"><span class="leg-dot" style="background:#EF9F27"></span>≤5 días</span>
          <span class="leg"><span class="leg-dot" style="background:#639922"></span>A tiempo</span>
          <span class="leg"><span class="leg-dot" style="background:#888780"></span>Cerrada</span>
        </div>
      </div>

      <!-- FORM -->
      <div class="form-area" id="form-area">
        <div class="form-title">Nueva tarea</div>
        <div class="form-row">
          <div class="form-field" style="flex:2;min-width:140px">
            <label>Título *</label>
            <input id="fa-title" type="text" placeholder="Nombre de la tarea" style="width:100%">
          </div>
          <div class="form-field">
            <label>Responsable</label>
            <select id="fa-who"><option>Anderson</option><option>Raul</option><option>Ambos</option></select>
          </div>
          <div class="form-field">
            <label>Prioridad</label>
            <select id="fa-pri"><option value="normal">Normal</option><option value="alta">Alta</option><option value="urgente">Urgente</option></select>
          </div>
          <div class="form-field">
            <label>Fecha límite</label>
            <input id="fa-date" type="date">
          </div>
          <div class="form-field" id="fa-biz-wrap">
            <label>Proyecto</label>
            <select id="fa-biz"><option value="0">Gestor HH</option><option value="1">Logístico</option><option value="2">Montevra</option></select>
          </div>
          <button class="btn-save" onclick="saveTask()">Guardar</button>
          <button class="btn-cancel" onclick="toggleForm()">Cancelar</button>
        </div>
      </div>

      <!-- KANBAN -->
      <div class="board" id="board"></div>
      <!-- GLOBAL VIEW -->
      <div class="global-view-wrap" id="global-view" style="display:none"></div>
      <!-- DASHBOARD -->
      <div class="dash-wrap" id="dash-view" style="display:none"></div>

    </div>
  </div>

  <!-- NOTES MODAL -->
  <div id="notes-overlay" class="notes-overlay" style="display:none" onclick="closeNotes(event)">
    <div class="notes-modal" onclick="event.stopPropagation()">
      <div class="notes-modal-head">
        <div>
          <div class="notes-modal-title" id="notes-title">Notas del avance</div>
          <div class="notes-modal-sub" id="notes-sub"></div>
        </div>
        <button class="notes-close" onclick="closeNotesBtn()">×</button>
      </div>
      <div class="notes-body">
        <textarea class="notes-textarea" id="notes-input" placeholder="Escribe una nota sobre este avance... (opcional)"></textarea>
        <div class="notes-history" id="notes-history"></div>
      </div>
      <div class="notes-footer">
        <button class="btn-save" onclick="saveNoteAndMove()" style="flex:1;background:var(--blue)">Confirmar avance</button>
        <button class="btn-cancel" onclick="closeNotesBtn()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- MOBILE BOTTOM NAV -->
  <nav class="mob-nav">
    <button class="mob-nav-btn act" id="mobnav-tablero" onclick="showSection('tablero')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Tablero
    </button>
    <button class="mob-nav-btn" id="mobnav-dashboard" onclick="showSection('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Dashboard
    </button>
    <button class="mob-nav-btn" id="mobnav-nueva" onclick="toggleForm()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nueva
    </button>
  </nav>

</div>

<script>
const PW='hh2026';
const BIZS=[{name:'Gestor Ambiental HH'},{name:'Operador Logístico'},{name:'Montevra'},{name:'Vista general'}];
const BIZ_C=['#639922','#378ADD','#D85A30'];
const BIZ_NAMES=['Gestor HH','Logístico','Montevra'];
const WHO={Anderson:{bg:'#E6F1FB',col:'#0C447C',init:'AN'},Raul:{bg:'#EAF3DE',col:'#27500A',init:'RA'},Ambos:{bg:'#FAEEDA',col:'#633806',init:'AM'}};
const SEM={urgente:{c:'#E24B4A',bg:'#FCEBEB',tc:'#791F1F'},alta:{c:'#EF9F27',bg:'#FAEEDA',tc:'#633806'},normal:{c:'#639922',bg:'#EAF3DE',tc:'#27500A'}};
const MONTHS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
window.tasks=[];let biz=0,tasks=window.tasks,curSection='tablero';

function checkPw(){
  if(document.getElementById('pw-input').value===PW){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('app').style.display='block';
    loadTasks();
  } else {
    document.getElementById('pw-err').style.display='block';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('lock-screen').style.display='flex';
  document.getElementById('pw-input').value='';
  document.getElementById('pw-err').style.display='none';
}

function setBiz(i){
  biz=i;
  // Update desktop tabs
  for(let j=0;j<4;j++){
    const dt=document.getElementById('pt'+j);
    const mt=document.getElementById('mpt'+j);
    const c=j===3?'#7F77DD':BIZ_C[j];
    if(dt){
      dt.classList.toggle('act',j===i);
      dt.style.background=j===i?c:'';
    }
    if(mt){
      mt.classList.toggle('act',j===i);
      mt.style.background=j===i?c:'';
    }
  }
  document.getElementById('proj-title').textContent=BIZS[i].name;
  // Show/hide btn-add only on tablero section
  const isBoard=i<3;
  document.getElementById('btn-add').style.display=(curSection==='tablero'&&isBoard)?'flex':'none';
  document.getElementById('form-area').style.display='none';
  renderCurrent();
}

function showSection(s){
  curSection=s;
  document.getElementById('sec-tablero').classList.toggle('act',s==='tablero');
  document.getElementById('sec-dashboard').classList.toggle('act',s==='dashboard');
  document.getElementById('mobnav-tablero').classList.toggle('act',s==='tablero');
  document.getElementById('mobnav-dashboard').classList.toggle('act',s==='dashboard');
  // btn-add only on tablero + biz < 3
  document.getElementById('btn-add').style.display=(s==='tablero'&&biz<3)?'flex':'none';
  document.getElementById('mobnav-nueva').style.display=(s==='tablero'&&biz<3)?'flex':'none';
  document.getElementById('form-area').style.display='none';
  renderCurrent();
}

function toggleForm(){
  const f=document.getElementById('form-area');
  const open=f.style.display==='none'||f.style.display==='';
  f.style.display=open?'block':'none';
  if(open){
    document.getElementById('fa-biz').value=String(biz<3?biz:0);
    document.getElementById('fa-title').focus();
  }
}

function loadTasks(){
  const s=localStorage.getItem('hh-socios-v3');
  if(s){tasks=JSON.parse(s);}
  else{
    tasks=[
      {id:'d1',title:'Revisar informe ambiental cliente norte',who:'Anderson',pri:'urgente',date:'2026-03-30',status:'p',biz:0},
      {id:'d2',title:'Actualizar base de datos de clientes',who:'Raul',pri:'normal',date:'2026-04-05',status:'e',biz:0},
      {id:'d3',title:'Enviar cotización pendiente',who:'Anderson',pri:'alta',date:'2026-04-02',status:'p',biz:0},
      {id:'d4',title:'Diseñar rutas semana 15',who:'Raul',pri:'alta',date:'2026-04-01',status:'p',biz:1},
      {id:'d5',title:'Confirmar inventario dark stores',who:'Anderson',pri:'normal',date:'2026-04-08',status:'e',biz:1},
      {id:'d6',title:'Pedido carnicería martes',who:'Raul',pri:'urgente',date:'2026-03-31',status:'p',biz:2},
      {id:'d7',title:'Registrar fiados de la semana',who:'Anderson',pri:'normal',date:'2026-04-04',status:'c',biz:2},
    ];
    persist();
  }
  setBiz(0);
}

function saveTask(){
  const title=document.getElementById('fa-title').value.trim();
  if(!title)return;
  tasks.push({id:Date.now()+'',title,who:document.getElementById('fa-who').value,pri:document.getElementById('fa-pri').value,date:document.getElementById('fa-date').value,status:'p',biz:parseInt(document.getElementById('fa-biz').value)});
  persist();
  document.getElementById('fa-title').value='';
  document.getElementById('fa-date').value='';
  document.getElementById('form-area').style.display='none';
  renderCurrent();
}

let pendingMove={id:null,dir:null};
function moveTask(id,dir){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const ord=['p','e','c'];const i=ord.indexOf(t.status);
  if(i+dir<0||i+dir>2)return;
  // Open notes modal before moving
  pendingMove={id,dir};
  const labels={p:'Pendiente',e:'En progreso',c:'Completada'};
  const newStatus=ord[i+dir];
  document.getElementById('notes-title').textContent='Avance → '+labels[newStatus];
  document.getElementById('notes-sub').textContent=t.title;
  document.getElementById('notes-input').value='';
  // Show existing notes
  const history=(t.notes||[]).slice().reverse();
  document.getElementById('notes-history').innerHTML=history.length
    ?history.map(n=>`<div class="notes-entry"><div class="notes-entry-txt">${n.text}</div><div class="notes-entry-meta">${n.date} · ${n.from}</div></div>`).join('')
    :'';
  document.getElementById('notes-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('notes-input').focus(),100);
}
function saveNoteAndMove(){
  const t=tasks.find(x=>x.id===pendingMove.id);if(!t)return;
  const ord=['p','e','c'];const i=ord.indexOf(t.status);
  if(i+pendingMove.dir<0||i+pendingMove.dir>2)return;
  const noteText=document.getElementById('notes-input').value.trim();
  if(noteText){
    if(!t.notes)t.notes=[];
    const now=new Date();
    t.notes.push({text:noteText,date:now.toLocaleDateString('es-CO'),from:document.getElementById('fwho').value||'Equipo'});
  }
  t.status=ord[i+pendingMove.dir];
  persist();
  document.getElementById('notes-overlay').style.display='none';
  renderCurrent();
}
function closeNotesBtn(){document.getElementById('notes-overlay').style.display='none';}
function closeNotes(e){if(e.target===document.getElementById('notes-overlay'))closeNotesBtn();}

let curResp='';
function setResp(v){
  curResp=v;
  ['all','anderson','raul','ambos'].forEach(k=>{
    const el=document.getElementById('rb-'+k);
    if(el)el.classList.toggle('act',(k==='all'&&v==='')||(k===v.toLowerCase()));
  });
  document.getElementById('fwho').value=v;
  renderCurrent();
}
function toggleDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.status=t.status==='c'?'p':'c';persist();renderCurrent();
}
function delTask(id){
  if(!confirm('¿Eliminar esta tarea?'))return;
  tasks=tasks.filter(x=>x.id!==id);persist();renderCurrent();
}
function persist(){
  localStorage.setItem('hh-socios-v3',JSON.stringify(tasks));
  localStorage.setItem('hh-socios-updated', Date.now());
  if(window.persistToFirebase) window.persistToFirebase(tasks);
}

function fmtDate(d){
  if(!d)return'';
  const[y,m,dd]=d.split('-');
  return parseInt(dd)+' '+MONTHS[parseInt(m)-1];
}
function isOver(d){
  if(!d)return false;
  const t=new Date();t.setHours(0,0,0,0);
  return new Date(d+'T00:00:00')<t;
}
function getFiltered(){
  const q=(document.getElementById('sq').value||'').toLowerCase();
  const who=document.getElementById('fwho').value;
  return tasks.filter(t=>{
    if(biz<3&&t.biz!==biz)return false;
    if(q&&!t.title.toLowerCase().includes(q))return false;
    if(who&&t.who!==who)return false;
    return true;
  });
}

window.renderCurrent=function renderCurrent(){
  // hide all panels first
  document.getElementById('board').style.display='none';
  document.getElementById('global-view').style.display='none';
  document.getElementById('dash-view').style.display='none';

  if(curSection==='dashboard'){
    document.getElementById('dash-view').style.display='block';
    renderDashboard();
    return;
  }
  // tablero section
  if(biz===3){
    document.getElementById('global-view').style.display='block';
    renderGlobal();
  } else {
    document.getElementById('board').style.display='flex';
    renderBoard();
  }
}

function daysLeft(d){
  if(!d)return null;
  const today=new Date();today.setHours(0,0,0,0);
  return Math.round((new Date(d+'T00:00:00')-today)/(1000*60*60*24));
}
function semByDate(t){
  if(t.status==='c')return{c:'#888780',bg:'#F1EFE8',tc:'#5F5E5A',label:'Completada'};
  if(!t.date)return{c:'#639922',bg:'#EAF3DE',tc:'#27500A',label:'A tiempo'};
  const dl=daysLeft(t.date);
  if(dl<0)return{c:'#E24B4A',bg:'#FCEBEB',tc:'#791F1F',label:'Vencida',vencida:true};
  if(dl<=5)return{c:'#EF9F27',bg:'#FAEEDA',tc:'#633806',label:`${dl}d restantes`};
  return{c:'#639922',bg:'#EAF3DE',tc:'#27500A',label:`${dl}d restantes`};
}
function cardHtml(t,showBiz){
  const done=t.status==='c';
  const sem=semByDate(t);
  const wa=WHO[t.who]||WHO.Anderson;
  const ord=['p','e','c'];const idx=ord.indexOf(t.status);
  return `<div class="card" style="${sem.vencida?'border-left:4px solid #E24B4A;border-radius:8px':''}">
    ${sem.vencida?'<div class="vencida-badge">⚠ VENCIDA</div>':''}
    <div class="card-top">
      <div class="card-cb${done?' done':''}" onclick="toggleDone('${t.id}')"></div>
      <span class="card-title${done?' done':''}">${t.title}</span>
    </div>
    <div class="card-meta">
      <span class="sem-pill" style="background:${sem.bg};color:${sem.tc}">
        <span style="width:6px;height:6px;border-radius:50%;background:${sem.c};display:inline-block"></span>
        ${sem.label}
      </span>
      ${t.date?`<span class="date-pill${sem.vencida?' over':''}">${fmtDate(t.date)}</span>`:''}
      ${t.notes&&t.notes.length?`<span style="font-size:11px;background:#E6F1FB;color:#0C447C;padding:2px 7px;border-radius:999px">${t.notes.length} nota${t.notes.length!==1?'s':''}</span>`:''}
      ${showBiz?`<span class="biz-pill" style="background:${BIZ_C[t.biz]}20;color:${BIZ_C[t.biz]}">${BIZ_NAMES[t.biz]||''}</span>`:''}
      <div class="avatar-sm" style="background:${wa.bg};color:${wa.col}">${wa.init}</div>
    </div>
    <div class="card-actions">
      ${idx>0?`<button class="ca-btn" onclick="moveTask('${t.id}',-1)">← Atrás</button>`:''}
      ${idx<2?`<button class="ca-btn" onclick="moveTask('${t.id}',1)">Avanzar →</button>`:`<span style="font-size:11px;color:var(--text3)">Completada ✓</span>`}
      <button class="ca-del" onclick="delTask('${t.id}')" title="Eliminar">×</button>
    </div>
  </div>`;
}

function renderBoard(){
  const list=getFiltered();
  const cols={v:[],p:[],e:[],c:[]};
  list.forEach(t=>{
    const over=t.date&&isOver(t.date)&&t.status!=='c';
    if(over) cols.v.push(t);
    else if(cols[t.status]) cols[t.status].push(t);
  });
  const labels=['Vencidas','Pendiente','En progreso','Completada'];
  const dotC=['#E24B4A','#B4B2A9','#378ADD','#639922'];
  const keys=['v','p','e','c'];
  let html='';
  keys.forEach((s,i)=>{
    const cards=cols[s];
    if(s==='v'&&cards.length===0)return;
    html+=`<div class="col-wrap">
      <div class="col-header">
        <span class="col-dot" style="background:${dotC[i]}"></span>
        <span class="col-label">${labels[i]}</span>
        <span class="col-cnt">${cards.length}</span>
      </div>
      <div class="col-body">
        ${cards.length?cards.map(t=>cardHtml(t,false)).join(''):'<div class="empty-col">Sin tareas</div>'}
        ${(s==='p'||s==='e')?`<button class="add-btn" onclick="toggleForm()">+ Agregar tarea</button>`:''}
      </div>
    </div>`;
  });
  document.getElementById('board').innerHTML=html;
}

function renderGlobal(){
  const q=(document.getElementById('sq').value||'').toLowerCase();
  const who=document.getElementById('fwho').value;
  let list=tasks.filter(t=>{
    if(q&&!t.title.toLowerCase().includes(q))return false;
    if(who&&t.who!==who)return false;
    return true;
  });
  const statusLabel={p:'Pendiente',e:'En progreso',c:'Completada'};
  if(!list.length){document.getElementById('global-view').innerHTML='<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">No hay tareas</div>';return;}
  const groups={};
  list.forEach(t=>{if(!groups[t.biz])groups[t.biz]=[];groups[t.biz].push(t);});
  let html='';
  Object.keys(groups).sort().forEach(bk=>{
    const bi=parseInt(bk);
    const byStatus={p:[],e:[],c:[]};
    groups[bk].forEach(t=>{if(byStatus[t.status])byStatus[t.status].push(t);});
    html+=`<div class="gsec">
      <div class="gsec-title">
        <span style="width:12px;height:12px;border-radius:3px;background:${BIZ_C[bi]};display:inline-block"></span>
        <span style="font-size:14px;font-weight:600;color:var(--text)">${BIZS[bi].name}</span>
        <span style="font-size:12px;color:var(--text3)">${groups[bk].length} tarea${groups[bk].length!==1?'s':''}</span>
      </div>`;
    ['p','e','c'].forEach(s=>{
      if(!byStatus[s].length)return;
      html+=`<div class="gstatus-label">${statusLabel[s]}</div>`;
      html+=`<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px">${byStatus[s].map(t=>cardHtml(t,false)).join('')}</div>`;
    });
    html+='</div>';
  });
  document.getElementById('global-view').innerHTML=html;
}

function renderDashboard(){
  const totP=tasks.filter(t=>t.status==='p').length;
  const totE=tasks.filter(t=>t.status==='e').length;
  const totC=tasks.filter(t=>t.status==='c').length;
  const tot=tasks.length;
  let html=`<div class="dash-h">Dashboard</div>
  <div class="dash-sub">Resumen de tareas por unidad de negocio</div>
  <div class="global-box">
    <div class="global-box-title">Resumen general</div>
    <div class="global-stats">
      <div class="g-stat"><div class="g-n" style="color:#1a1a1a">${tot}</div><div class="g-l">Total</div></div>
      <div class="g-stat"><div class="g-n" style="color:#B4B2A9">${totP}</div><div class="g-l">Pendiente</div></div>
      <div class="g-stat"><div class="g-n" style="color:#378ADD">${totE}</div><div class="g-l">En progreso</div></div>
      <div class="g-stat"><div class="g-n" style="color:#639922">${totC}</div><div class="g-l">Completada</div></div>
    </div>
  </div>
  <div class="biz-grid">`;
  [0,1,2].forEach(bi=>{
    const bt=tasks.filter(t=>t.biz===bi);
    const bp=bt.filter(t=>t.status==='p').length;
    const be=bt.filter(t=>t.status==='e').length;
    const bc=bt.filter(t=>t.status==='c').length;
    const total=bt.length||1;
    const pct=Math.round((bc/total)*100);
    const anderson=bt.filter(t=>t.who==='Anderson'||t.who==='Ambos').length;
    const raul=bt.filter(t=>t.who==='Raul'||t.who==='Ambos').length;
    const urg=bt.filter(t=>t.pri==='urgente'&&t.status!=='c').length;
    html+=`<div class="biz-card">
      <div class="biz-card-top">
        <span class="biz-dot" style="background:${BIZ_C[bi]}"></span>
        <span class="biz-name">${BIZS[bi].name}</span>
        ${urg>0?`<span class="urg-badge">⚠ ${urg} urgente${urg!==1?'s':''}</span>`:''}
      </div>
      <div class="biz-stats">
        <div class="biz-stat"><div class="biz-stat-n" style="color:#B4B2A9">${bp}</div><div class="biz-stat-l">Pendiente</div></div>
        <div class="biz-stat"><div class="biz-stat-n" style="color:#378ADD">${be}</div><div class="biz-stat-l">En prog.</div></div>
        <div class="biz-stat"><div class="biz-stat-n" style="color:#639922">${bc}</div><div class="biz-stat-l">Completada</div></div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${BIZ_C[bi]}"></div></div>
      <div class="prog-labels"><span>Progreso</span><span style="font-weight:600;color:${BIZ_C[bi]}">${pct}%</span></div>
      <div class="people-row">
        <div class="person"><div class="person-name">Anderson</div><div class="person-n">${anderson}</div><div class="person-l">tareas</div></div>
        <div class="person"><div class="person-name">Raul</div><div class="person-n">${raul}</div><div class="person-l">tareas</div></div>
      </div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('dash-view').innerHTML=html;
}
</script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, onSnapshot, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCxhnHG97zE_VY2yBcnlDv7wwjtdmVhQS0",
  authDomain: "tablero-socios.firebaseapp.com",
  projectId: "tablero-socios",
  storageBucket: "tablero-socios.firebasestorage.app",
  messagingSenderId: "48250300185",
  appId: "1:48250300185:web:83a8e111c7b487a00fc788"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_REF = doc(db, 'hh-socios', 'tareas');

// Override persist to save to Firebase + localStorage
window.persistToFirebase = async function(taskList) {
  try {
    await setDoc(DOC_REF, { tasks: taskList, updatedAt: Date.now() });
  } catch(e) {
    console.warn('Firebase write error:', e);
  }
};

// Listen for real-time changes from Firebase
window.addEventListener('app-ready', () => {
  onSnapshot(DOC_REF, (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      if (data.tasks && Array.isArray(data.tasks)) {
        // Only update if data is newer than what we have locally
        const localUpdated = parseInt(localStorage.getItem('hh-socios-updated') || '0');
        if (data.updatedAt > localUpdated) {
          window.tasks = data.tasks;
          localStorage.setItem('hh-socios-v3', JSON.stringify(data.tasks));
          localStorage.setItem('hh-socios-updated', data.updatedAt);
          if (typeof window.renderCurrent === 'function') window.renderCurrent();
          // Show sync indicator
          const ind = document.getElementById('sync-indicator');
          if (ind) { ind.style.opacity='1'; setTimeout(()=>ind.style.opacity='0', 2000); }
        }
      }
    }
  });
});
</script>
