<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HH Tablero</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f5f5f3;color:#1a1a1a;min-height:100vh}
:root{--red:#F06A6A;--border:#e8e8e6;--bg:#fff;--bg2:#f5f5f3;--text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;--radius:8px}

/* TOPNAV */
.topnav{height:52px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:10}
.logo-dot{width:28px;height:28px;border-radius:8px;background:var(--red);display:flex;align-items:center;justify-content:center}
.logo-dot svg{width:15px;height:15px;fill:#fff}
.logo-name{font-size:15px;font-weight:600;color:var(--text)}
.nav-link{font-size:13px;color:var(--text2);cursor:pointer;padding:4px 10px;border-radius:6px;text-decoration:none}
.nav-link:hover{background:#f0f0ee}
.nav-link.act{color:var(--text);font-weight:500}
.search-top{height:30px;padding:0 10px;font-size:12px;border:1px solid var(--border);border-radius:6px;min-width:180px;background:var(--bg);color:var(--text);outline:none}
.search-top:focus{border-color:#ccc}
.fsel-top{height:30px;padding:0 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text2)}
.avatar-btn{width:30px;height:30px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;cursor:pointer;border:none}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 52px)}

/* SIDEBAR */
.sidebar{width:220px;background:var(--bg);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex-shrink:0}
.sb-sect{font-size:10px;color:var(--text3);letter-spacing:.06em;padding:8px 10px 4px;text-transform:uppercase;font-weight:500}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:background .1s;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:#f0f0ee}
.sb-item.act{background:#fff1f0;color:#c0392b;font-weight:500}
.sb-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.sb-divider{height:1px;background:var(--border);margin:6px 10px}

/* PROJECT BAR */
.project-bar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;background:var(--bg)}
.proj-title{font-size:15px;font-weight:600;color:var(--text);flex:1}
.view-tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.view-tab{padding:5px 13px;font-size:12px;color:var(--text2);cursor:pointer;background:var(--bg);border:none;font-family:inherit}
.view-tab.act{background:var(--red);color:#fff}
.btn-task{background:var(--red);color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.btn-task:hover{background:#e05555}

/* FILTER BAR */
.filter-bar{height:40px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:8px;background:var(--bg)}
.fbtn{height:28px;padding:0 10px;font-size:12px;color:var(--text2);border:1px solid var(--border);border-radius:6px;background:var(--bg);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.fbtn:hover{background:#f0f0ee}
.sem-leg{display:flex;align-items:center;gap:12px;margin-left:auto}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:50%}

/* BOARD */
.board-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.board{display:flex;gap:16px;padding:20px;overflow-x:auto;align-items:flex-start;background:var(--bg2);flex:1}
.col-wrap{width:265px;flex-shrink:0}
.col-header{display:flex;align-items:center;gap:8px;padding:0 2px 10px}
.col-dot{width:10px;height:10px;border-radius:50%}
.col-label{font-size:13px;font-weight:600;color:var(--text)}
.col-cnt{font-size:12px;color:var(--text3)}
.col-body{display:flex;flex-direction:column;gap:6px}

/* CARD */
.card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color .12s}
.card:hover{border-color:#ccc}
.card-cb{width:14px;height:14px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;cursor:pointer;transition:all .15s;margin-top:1px}
.card-cb.done{background:#639922;border-color:#639922}
.card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.card-title{font-size:13px;color:var(--text);line-height:1.4;flex:1}
.card-title.done{text-decoration:line-through;color:var(--text3)}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sem-pill{display:flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:500}
.date-pill{font-size:11px;padding:2px 7px;border-radius:999px;background:#f0f0ee;color:var(--text2)}
.date-pill.over{background:#fcebeb;color:#791f1f}
.biz-pill{font-size:11px;padding:2px 7px;border-radius:999px;font-weight:500}
.avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;margin-left:auto;flex-shrink:0}
.card-actions{display:flex;gap:4px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border);align-items:center}
.ca-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;color:var(--text2);font-family:inherit}
.ca-btn:hover{background:#f0f0ee}
.ca-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;margin-left:auto;line-height:1;padding:0 2px}
.ca-del:hover{color:#E24B4A}
.add-card-btn{display:flex;align-items:center;gap:6px;padding:8px 4px;font-size:13px;color:var(--text3);cursor:pointer;border-radius:6px;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.add-card-btn:hover{color:var(--red)}
.empty-col{background:var(--bg);border:1px dashed var(--border);border-radius:8px;padding:24px;text-align:center;font-size:12px;color:var(--text3)}

/* FORM */
.form-area{padding:12px 20px;border-top:1px solid var(--border);background:var(--bg);display:none}
.form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.form-field label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px}
.form-field input,.form-field select{height:32px;font-size:13px;border:1px solid var(--border);border-radius:6px;padding:0 8px;background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.form-field input:focus,.form-field select:focus{border-color:#ccc}
.btn-save{height:32px;background:var(--red);color:#fff;border:none;border-radius:8px;padding:0 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-save:hover{background:#e05555}
.btn-cancel{height:32px;background:none;border:1px solid var(--border);border-radius:8px;padding:0 12px;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit}

/* LOCK */
.lock-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg2)}
.lock-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:36px 30px;width:320px;text-align:center}
.lock-icon{width:48px;height:48px;background:#fff1f0;border-radius:12px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
.lock-input{width:100%;height:40px;font-size:14px;text-align:center;letter-spacing:.12em;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;outline:none;font-family:inherit;background:var(--bg);color:var(--text)}
.lock-input:focus{border-color:#ccc}
.lock-btn{width:100%;height:40px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.lock-btn:hover{background:#e05555}
.lock-err{font-size:12px;color:#E24B4A;margin-bottom:10px;display:none}

/* GLOBAL VIEW */
.global-section{margin-bottom:20px}
.global-section-title{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.global-status-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin:8px 0 4px}

@media(max-width:680px){
  .sidebar{display:none}
  .board{padding:12px;gap:10px}
  .col-wrap{width:220px}
  .topnav .nav-link{display:none}
}
</style>
</head>
<body>

<!-- PANTALLA DE ACCESO -->
<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F06A6A" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div style="font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px">HH Tablero</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.5">Ingresa la clave para acceder al tablero de tus proyectos</div>
    <input class="lock-input" id="pw-input" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="lock-err" id="pw-err">Clave incorrecta. Intenta de nuevo.</div>
    <button class="lock-btn" onclick="checkPw()">Entrar</button>
    <div style="font-size:11px;color:var(--text3);margin-top:16px">Gestor HH · Logístico · Montevra</div>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app" style="display:none">
  <nav class="topnav">
    <div style="display:flex;align-items:center;gap:10px;margin-right:8px">
      <div class="logo-dot"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="3.5"/><circle cx="19.5" cy="16.5" r="3.5"/><circle cx="4.5" cy="16.5" r="3.5"/></svg></div>
      <span class="logo-name">HH Tablero</span>
    </div>
    <a class="nav-link act">Inicio</a>
    <a class="nav-link">Mis tareas</a>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
      <input class="search-top" type="text" placeholder="Buscar tarea..." id="sq" oninput="renderBoard()">
      <select class="fsel-top" id="fwho" onchange="renderBoard()">
        <option value="">Todos</option>
        <option>Anderson</option>
        <option>Raul</option>
        <option>Ambos</option>
      </select>
      <button class="avatar-btn" onclick="logout()" title="Cerrar sesión">HH</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <div class="sb-sect">Proyectos</div>
      <button class="sb-item act" id="sb0" onclick="setBiz(0,this)"><span class="sb-icon" style="background:#639922">G</span>Gestor HH</button>
      <button class="sb-item" id="sb1" onclick="setBiz(1,this)"><span class="sb-icon" style="background:#378ADD">L</span>Logístico</button>
      <button class="sb-item" id="sb2" onclick="setBiz(2,this)"><span class="sb-icon" style="background:#D85A30">M</span>Montevra</button>
      <div class="sb-divider"></div>
      <button class="sb-item" id="sb3" onclick="setBiz(3,this)"><span class="sb-icon" style="background:#7F77DD">V</span>Vista general</button>
      <div style="margin-top:auto">
        <div class="sb-divider"></div>
        <div style="padding:10px 10px 4px;display:flex;align-items:center;gap:8px">
          <div style="width:26px;height:26px;border-radius:50%;background:#fff1f0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#F06A6A">HH</div>
          <div>
            <div style="font-size:12px;font-weight:500;color:var(--text)">Espacio de trabajo</div>
            <div style="font-size:10px;color:var(--text3)">Anderson · Raul</div>
          </div>
        </div>
      </div>
    </aside>

    <div class="board-wrap">
      <div class="project-bar">
        <span class="proj-title" id="proj-title">Gestor Ambiental HH</span>
        <div class="view-tabs">
          <button class="view-tab">Lista</button>
          <button class="view-tab act">Tablero</button>
          <button class="view-tab">Calendario</button>
        </div>
        <button class="btn-task" id="btn-add" onclick="toggleForm()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nueva tarea
        </button>
      </div>

      <div class="filter-bar">
        <button class="fbtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          Filtrar
        </button>
        <button class="fbtn">Ordenar</button>
        <div class="sem-leg">
          <span class="leg"><span class="leg-dot" style="background:#E24B4A"></span>Urgente</span>
          <span class="leg"><span class="leg-dot" style="background:#EF9F27"></span>Alta</span>
          <span class="leg"><span class="leg-dot" style="background:#639922"></span>Normal</span>
        </div>
      </div>

      <div class="form-area" id="form-area">
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px">Nueva tarea</div>
        <div class="form-row">
          <div class="form-field" style="flex:2;min-width:140px">
            <label>Título *</label>
            <input id="fa-title" type="text" placeholder="Nombre de la tarea" style="width:100%">
          </div>
          <div class="form-field">
            <label>Responsable</label>
            <select id="fa-who"><option>Anderson</option><option>Raul</option><option>Ambos</option></select>
          </div>
          <div class="form-field">
            <label>Prioridad</label>
            <select id="fa-pri"><option value="normal">Normal</option><option value="alta">Alta</option><option value="urgente">Urgente</option></select>
          </div>
          <div class="form-field">
            <label>Fecha límite</label>
            <input id="fa-date" type="date">
          </div>
          <div class="form-field" id="fa-biz-wrap">
            <label>Proyecto</label>
            <select id="fa-biz"><option value="0">Gestor HH</option><option value="1">Logístico</option><option value="2">Montevra</option></select>
          </div>
          <button class="btn-save" onclick="saveTask()">Guardar</button>
          <button class="btn-cancel" onclick="toggleForm()">Cancelar</button>
        </div>
      </div>

      <div class="board" id="board"></div>
      <div id="global-view" style="display:none;padding:20px;background:var(--bg2);flex:1;overflow-y:auto"></div>
    </div>
  </div>
</div>

<script>
const PW = 'hh2026';
const BIZS = [
  {name:'Gestor Ambiental HH', acc:'#639922'},
  {name:'Operador Logístico', acc:'#378ADD'},
  {name:'Montevra', acc:'#D85A30'},
  {name:'Vista general', acc:'#7F77DD'}
];
const WHO = {
  Anderson:{bg:'#E6F1FB',col:'#0C447C',init:'AN'},
  Raul:{bg:'#EAF3DE',col:'#27500A',init:'RA'},
  Ambos:{bg:'#FAEEDA',col:'#633806',init:'AM'}
};
const BIZ_C = ['#639922','#378ADD','#D85A30'];
const SEM = {
  urgente:{c:'#E24B4A',bg:'#FCEBEB',tc:'#791F1F'},
  alta:{c:'#EF9F27',bg:'#FAEEDA',tc:'#633806'},
  normal:{c:'#639922',bg:'#EAF3DE',tc:'#27500A'}
};
const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
let biz = 0, tasks = [];

function checkPw() {
  if (document.getElementById('pw-input').value === PW) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadTasks();
  } else {
    document.getElementById('pw-err').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function logout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-err').style.display = 'none';
}

function setBiz(i, el) {
  biz = i;
  document.querySelectorAll('.sb-item').forEach(e => e.classList.remove('act'));
  el.classList.add('act');
  document.getElementById('proj-title').textContent = BIZS[i].name;
  document.getElementById('btn-add').style.display = i < 3 ? 'flex' : 'none';
  document.getElementById('form-area').style.display = 'none';
  document.getElementById('board').style.display = i < 3 ? 'flex' : 'none';
  document.getElementById('global-view').style.display = i === 3 ? 'block' : 'none';
  if (i === 3) renderGlobal(); else renderBoard();
}

function toggleForm() {
  const f = document.getElementById('form-area');
  const open = f.style.display === 'none' || f.style.display === '';
  f.style.display = open ? 'block' : 'none';
  if (open) {
    document.getElementById('fa-biz').value = String(biz < 3 ? biz : 0);
    document.getElementById('fa-biz-wrap').style.display = biz === 3 ? 'block' : 'none';
    document.getElementById('fa-title').focus();
  }
}

function loadTasks() {
  const saved = localStorage.getItem('hh-tablero-v1');
  if (saved) { tasks = JSON.parse(saved); }
  else {
    tasks = [
      {id:'d1',title:'Revisar informe ambiental cliente norte',who:'Anderson',pri:'urgente',date:'2026-03-30',status:'p',biz:0},
      {id:'d2',title:'Actualizar base de datos de clientes',who:'Raul',pri:'normal',date:'2026-04-05',status:'e',biz:0},
      {id:'d3',title:'Enviar cotización pendiente',who:'Anderson',pri:'alta',date:'2026-04-02',status:'p',biz:0},
      {id:'d4',title:'Diseñar rutas semana 15',who:'Raul',pri:'alta',date:'2026-04-01',status:'p',biz:1},
      {id:'d5',title:'Confirmar inventario dark stores',who:'Anderson',pri:'normal',date:'2026-04-08',status:'e',biz:1},
      {id:'d6',title:'Pedido carnicería martes',who:'Raul',pri:'urgente',date:'2026-03-31',status:'p',biz:2},
      {id:'d7',title:'Registrar fiados de la semana',who:'Anderson',pri:'normal',date:'2026-04-04',status:'c',biz:2},
    ];
    persist();
  }
  renderBoard();
}

function saveTask() {
  const title = document.getElementById('fa-title').value.trim();
  if (!title) return;
  tasks.push({
    id: Date.now() + '',
    title,
    who: document.getElementById('fa-who').value,
    pri: document.getElementById('fa-pri').value,
    date: document.getElementById('fa-date').value,
    status: 'p',
    biz: parseInt(document.getElementById('fa-biz').value)
  });
  persist();
  document.getElementById('fa-title').value = '';
  document.getElementById('fa-date').value = '';
  document.getElementById('form-area').style.display = 'none';
  if (biz === 3) renderGlobal(); else renderBoard();
}

function moveTask(id, dir) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  const ord = ['p','e','c']; const i = ord.indexOf(t.status);
  if (i + dir < 0 || i + dir > 2) return;
  t.status = ord[i + dir]; persist();
  if (biz === 3) renderGlobal(); else renderBoard();
}

function toggleDone(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t.status = t.status === 'c' ? 'p' : 'c'; persist();
  if (biz === 3) renderGlobal(); else renderBoard();
}

function delTask(id) {
  if (!confirm('¿Eliminar esta tarea?')) return;
  tasks = tasks.filter(x => x.id !== id); persist();
  if (biz === 3) renderGlobal(); else renderBoard();
}

function persist() { localStorage.setItem('hh-tablero-v1', JSON.stringify(tasks)); }

function fmtDate(d) {
  if (!d) return '';
  const [y,m,dd] = d.split('-');
  return parseInt(dd) + ' ' + MONTHS[parseInt(m)-1];
}

function isOver(d) {
  if (!d) return false;
  const t = new Date(); t.setHours(0,0,0,0);
  return new Date(d + 'T00:00:00') < t;
}

function cardHtml(t, showBiz) {
  const done = t.status === 'c';
  const sem = done ? {c:'#888780',bg:'#F1EFE8',tc:'#5F5E5A'} : (SEM[t.pri] || SEM.normal);
  const wa = WHO[t.who] || WHO.Anderson;
  const ord = ['p','e','c']; const idx = ord.indexOf(t.status);
  const over = t.date && isOver(t.date) && !done;
  const bizNames = ['Gestor HH','Logístico','Montevra'];
  return `<div class="card">
    <div class="card-top">
      <div class="card-cb${done?' done':''}" onclick="toggleDone('${t.id}')"></div>
      <span class="card-title${done?' done':''}">${t.title}</span>
    </div>
    <div class="card-meta">
      <span class="sem-pill" style="background:${sem.bg};color:${sem.tc}">
        <span style="width:6px;height:6px;border-radius:50%;background:${sem.c};display:inline-block"></span>
        ${done ? 'Completada' : t.pri.charAt(0).toUpperCase()+t.pri.slice(1)}
      </span>
      ${t.date ? `<span class="date-pill${over?' over':''}">${over?'! ':''}${fmtDate(t.date)}</span>` : ''}
      ${showBiz ? `<span class="biz-pill" style="background:${BIZ_C[t.biz]}18;color:${BIZ_C[t.biz]}">${bizNames[t.biz]||''}</span>` : ''}
      <div class="avatar" style="background:${wa.bg};color:${wa.col}">${wa.init}</div>
    </div>
    <div class="card-actions">
      ${idx > 0 ? `<button class="ca-btn" onclick="moveTask('${t.id}',-1)">← Atrás</button>` : ''}
      ${idx < 2 ? `<button class="ca-btn" onclick="moveTask('${t.id}',1)">Avanzar →</button>` : `<span style="font-size:11px;color:var(--text3)">Completada ✓</span>`}
      <button class="ca-del" onclick="delTask('${t.id}')" title="Eliminar">×</button>
    </div>
  </div>`;
}

function renderBoard() {
  const q = (document.getElementById('sq').value || '').toLowerCase();
  const who = document.getElementById('fwho').value;
  const list = tasks.filter(t => {
    if (biz < 3 && t.biz !== biz) return false;
    if (q && !t.title.toLowerCase().includes(q)) return false;
    if (who && t.who !== who) return false;
    return true;
  });
  const cols = {p:[],e:[],c:[]};
  list.forEach(t => { if (cols[t.status]) cols[t.status].push(t); });
  const labels = ['Pendiente','En progreso','Completada'];
  const dotC = ['#B4B2A9','#378ADD','#639922'];
  let html = '';
  ['p','e','c'].forEach((s,i) => {
    const cards = cols[s];
    html += `<div class="col-wrap">
      <div class="col-header">
        <span class="col-dot" style="background:${dotC[i]}"></span>
        <span class="col-label">${labels[i]}</span>
        <span class="col-cnt">${cards.length}</span>
      </div>
      <div class="col-body">
        ${cards.length ? cards.map(t => cardHtml(t,false)).join('') : '<div class="empty-col">Sin tareas aquí</div>'}
        ${s !== 'c' ? `<button class="add-card-btn" onclick="toggleForm()">+ Agregar tarea</button>` : ''}
      </div>
    </div>`;
  });
  document.getElementById('board').innerHTML = html;
}

function renderGlobal() {
  const q = (document.getElementById('sq').value || '').toLowerCase();
  const who = document.getElementById('fwho').value;
  const bizNames = ['Gestor Ambiental HH','Operador Logístico','Montevra'];
  const statusLabel = {p:'Pendiente',e:'En progreso',c:'Completada'};
  let list = tasks.filter(t => {
    if (q && !t.title.toLowerCase().includes(q)) return false;
    if (who && t.who !== who) return false;
    return true;
  });
  if (!list.length) {
    document.getElementById('global-view').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">No hay tareas que coincidan</div>';
    return;
  }
  const groups = {};
  list.forEach(t => { if (!groups[t.biz]) groups[t.biz]=[]; groups[t.biz].push(t); });
  let html = '';
  Object.keys(groups).sort().forEach(bk => {
    const bi = parseInt(bk);
    const byStatus = {p:[],e:[],c:[]};
    groups[bk].forEach(t => { if (byStatus[t.status]) byStatus[t.status].push(t); });
    html += `<div class="global-section">
      <div class="global-section-title">
        <span style="width:12px;height:12px;border-radius:3px;background:${BIZ_C[bi]};display:inline-block"></span>
        <span style="font-size:14px;font-weight:600;color:var(--text)">${bizNames[bi]}</span>
        <span style="font-size:12px;color:var(--text3)">${groups[bk].length} tarea${groups[bk].length!==1?'s':''}</span>
      </div>`;
    ['p','e','c'].forEach(s => {
      if (!byStatus[s].length) return;
      html += `<div class="global-status-label">${statusLabel[s]}</div>`;
      html += `<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px">${byStatus[s].map(t=>cardHtml(t,false)).join('')}</div>`;
    });
    html += '</div>';
  });
  document.getElementById('global-view').innerHTML = html;
}
</script>
</body>
</html>
